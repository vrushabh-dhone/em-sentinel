<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="65%" r="60%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#050d1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#1e90ff" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#0066cc" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4da6ff" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#1a6bcc" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b0d4f1"/>
      <stop offset="30%" stop-color="#e8f4ff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#b0d4f1"/>
      <stop offset="100%" stop-color="#6badd6"/>
    </linearGradient>
    <linearGradient id="swordBlade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0d8e8"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e0eef8"/>
      <stop offset="100%" stop-color="#8ab8d8"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3355" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ff6680"/>
      <stop offset="60%" stop-color="#66bbff"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="cascadeRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3355"/>
      <stop offset="100%" stop-color="#cc1133"/>
    </linearGradient>
    <linearGradient id="cascadeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4da6ff"/>
      <stop offset="100%" stop-color="#1a80e6"/>
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1e3d"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowXL">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background: black with blue mist -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#blueGlow)"/>

  <!-- Mountain silhouette (misty blue, bottom half) -->
  <g opacity="0.4">
    <path d="M0 700 Q100 650 200 680 Q350 620 450 660 Q540 630 600 650 Q700 600 800 640 Q900 610 1000 650 Q1050 670 1080 660 L1080 780 L0 780 Z"
          fill="#0a1e3d" opacity="0.6"/>
    <path d="M0 730 Q150 700 300 720 Q450 690 540 710 Q680 680 800 700 Q950 690 1080 710 L1080 800 L0 800 Z"
          fill="#061428" opacity="0.8"/>
  </g>

  <!-- Blue atmospheric mist -->
  <ellipse cx="540" cy="680" rx="500" ry="80" fill="#1a6bcc" opacity="0.04" filter="url(#softBlur)"/>

  <!-- NiCE logo (top center, matching theme) -->
  <text x="540" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700"
        fill="#ffffff" text-anchor="middle" letter-spacing="2">NiCE</text>

  <!-- Central shield glow -->
  <ellipse cx="540" cy="380" rx="200" ry="200" fill="url(#shieldGlow)" opacity="0.6"/>

  <!-- Floating blue glow ring (like crown glow in original) -->
  <ellipse cx="540" cy="200" rx="80" ry="12" fill="none" stroke="#4da6ff" stroke-width="2" opacity="0.5" filter="url(#glowStrong)"/>
  <ellipse cx="540" cy="200" rx="60" ry="8" fill="#4da6ff" opacity="0.1"/>

  <!-- AI "Crown" - circuit crown above shield -->
  <g filter="url(#glowStrong)" transform="translate(540, 165)">
    <!-- Crown base -->
    <path d="M-50 15 L-45 -5 L-25 5 L-10 -20 L0 -30 L10 -20 L25 5 L45 -5 L50 15 Z"
          fill="none" stroke="#b0d8f1" stroke-width="2" opacity="0.9"/>
    <path d="M-50 15 L50 15" fill="none" stroke="#e0f0ff" stroke-width="2.5"/>
    <!-- Crown jewel points -->
    <circle cx="0" cy="-30" r="4" fill="#4da6ff" opacity="0.9"/>
    <circle cx="-25" cy="5" r="3" fill="#4da6ff" opacity="0.7"/>
    <circle cx="25" cy="5" r="3" fill="#4da6ff" opacity="0.7"/>
    <circle cx="-45" cy="-5" r="2.5" fill="#80c8ff" opacity="0.6"/>
    <circle cx="45" cy="-5" r="2.5" fill="#80c8ff" opacity="0.6"/>
    <!-- Circuit traces from crown -->
    <path d="M0 -30 L0 -45 M-5 -42 L0 -45 L5 -42" fill="none" stroke="#4da6ff" stroke-width="1.5" opacity="0.6"/>
    <path d="M-25 5 L-35 -10 L-35 -20" fill="none" stroke="#4da6ff" stroke-width="1" opacity="0.4"/>
    <path d="M25 5 L35 -10 L35 -20" fill="none" stroke="#4da6ff" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Crossed swords behind/around shield (silver, matching theme) -->
  <g opacity="0.6">
    <!-- Left sword -->
    <line x1="320" y1="250" x2="700" y2="580" stroke="url(#swordBlade)" stroke-width="3" stroke-linecap="round"/>
    <line x1="320" y1="250" x2="700" y2="580" stroke="#ffffff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <!-- Right sword -->
    <line x1="760" y1="250" x2="380" y2="580" stroke="url(#swordBlade)" stroke-width="3" stroke-linecap="round"/>
    <line x1="760" y1="250" x2="380" y2="580" stroke="#ffffff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <!-- Sword hilts (left) -->
    <line x1="305" y1="240" x2="340" y2="260" stroke="#8ab8d8" stroke-width="4" stroke-linecap="round"/>
    <circle cx="310" cy="237" r="4" fill="#b0d4f1" opacity="0.7"/>
    <!-- Sword hilts (right) -->
    <line x1="775" y1="240" x2="740" y2="260" stroke="#8ab8d8" stroke-width="4" stroke-linecap="round"/>
    <circle cx="770" cy="237" r="4" fill="#b0d4f1" opacity="0.7"/>
  </g>

  <!-- Large central shield -->
  <g filter="url(#glowStrong)">
    <path d="M540 230 L700 300 L700 430 C700 540 540 620 540 620 C540 620 380 540 380 430 L380 300 Z"
          fill="#0a1628" fill-opacity="0.6" stroke="url(#shieldStroke)" stroke-width="3" opacity="0.95"/>
  </g>

  <!-- AI Eye / Sentinel core inside shield -->
  <g filter="url(#glow)" opacity="0.95">
    <!-- Central sentinel eye -->
    <ellipse cx="540" cy="400" rx="55" ry="40" fill="none" stroke="#e0f0ff" stroke-width="2.5"/>
    <ellipse cx="540" cy="400" rx="32" ry="22" fill="#1a6bcc" opacity="0.2"/>
    <circle cx="540" cy="400" r="12" fill="#4da6ff" opacity="0.7"/>
    <circle cx="540" cy="400" r="6" fill="#ffffff" opacity="0.95"/>

    <!-- Circuit branches (silver/blue) -->
    <path d="M485 400 L440 400 L440 355 L415 355" fill="none" stroke="#b0d8f1" stroke-width="2" opacity="0.7"/>
    <path d="M595 400 L640 400 L640 355 L665 355" fill="none" stroke="#b0d8f1" stroke-width="2" opacity="0.7"/>
    <path d="M540 360 L540 320 L505 290" fill="none" stroke="#b0d8f1" stroke-width="2" opacity="0.7"/>
    <path d="M540 360 L540 320 L575 290" fill="none" stroke="#b0d8f1" stroke-width="2" opacity="0.7"/>
    <path d="M540 440 L540 480 L505 510" fill="none" stroke="#b0d8f1" stroke-width="2" opacity="0.7"/>
    <path d="M540 440 L540 480 L575 510" fill="none" stroke="#b0d8f1" stroke-width="2" opacity="0.7"/>
    <path d="M495 380 L455 360" fill="none" stroke="#b0d8f1" stroke-width="1.5" opacity="0.5"/>
    <path d="M585 380 L625 360" fill="none" stroke="#b0d8f1" stroke-width="1.5" opacity="0.5"/>
    <path d="M495 420 L455 440 L430 475" fill="none" stroke="#b0d8f1" stroke-width="1.5" opacity="0.5"/>
    <path d="M585 420 L625 440 L650 475" fill="none" stroke="#b0d8f1" stroke-width="1.5" opacity="0.5"/>

    <!-- Circuit nodes (blue jewel-like) -->
    <circle cx="415" cy="355" r="5" fill="#4da6ff" opacity="0.8"/>
    <circle cx="665" cy="355" r="5" fill="#4da6ff" opacity="0.8"/>
    <circle cx="505" cy="290" r="4" fill="#4da6ff" opacity="0.7"/>
    <circle cx="575" cy="290" r="4" fill="#4da6ff" opacity="0.7"/>
    <circle cx="505" cy="510" r="4" fill="#4da6ff" opacity="0.7"/>
    <circle cx="575" cy="510" r="4" fill="#4da6ff" opacity="0.7"/>
    <circle cx="455" cy="360" r="3" fill="#80c8ff" opacity="0.5"/>
    <circle cx="625" cy="360" r="3" fill="#80c8ff" opacity="0.5"/>
    <circle cx="430" cy="475" r="3" fill="#80c8ff" opacity="0.5"/>
    <circle cx="650" cy="475" r="3" fill="#80c8ff" opacity="0.5"/>
  </g>


  <!-- Cascade section (below shield) -->
  <!-- Left: cascade failure (red) -->
  <g transform="translate(150, 680)">
    <rect x="0" y="0" width="16" height="50" rx="2" fill="url(#cascadeRed)" transform="rotate(-48, 8, 50)" opacity="0.9"/>
    <rect x="38" y="4" width="16" height="50" rx="2" fill="url(#cascadeRed)" transform="rotate(-36, 46, 54)" opacity="0.7"/>
    <rect x="76" y="7" width="16" height="50" rx="2" fill="url(#cascadeRed)" transform="rotate(-24, 84, 57)" opacity="0.55"/>
    <rect x="114" y="9" width="16" height="50" rx="2" fill="url(#cascadeRed)" transform="rotate(-12, 122, 59)" opacity="0.4"/>
    <text x="65" y="-8" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ff4466" font-weight="700" text-anchor="middle" opacity="0.8">5-7x</text>
  </g>

  <!-- Right: protected (blue, standing) -->
  <g transform="translate(760, 680)">
    <rect x="0" y="0" width="16" height="50" rx="2" fill="url(#cascadeBlue)" opacity="0.9"/>
    <rect x="38" y="0" width="16" height="50" rx="2" fill="url(#cascadeBlue)" opacity="0.75"/>
    <rect x="76" y="0" width="16" height="50" rx="2" fill="url(#cascadeBlue)" opacity="0.6"/>
    <rect x="114" y="0" width="16" height="50" rx="2" fill="url(#cascadeBlue)" opacity="0.45"/>
    <rect x="152" y="0" width="16" height="50" rx="2" fill="url(#cascadeBlue)" opacity="0.35"/>
    <text x="85" y="-8" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#4da6ff" font-weight="700" text-anchor="middle" opacity="0.8">SAVED</text>
  </g>

  <!-- Healing pulse line -->
  <g filter="url(#glow)">
    <path d="M140 780 Q320 780 410 780 L445 755 L475 810 L505 740 L535 800 L565 760 L595 785 L630 780 Q760 780 940 780"
          fill="none" stroke="url(#pulseGrad)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Circuit breaker (center of pulse) -->
  <g filter="url(#glowStrong)" transform="translate(540, 760)">
    <circle cx="0" cy="0" r="22" fill="#000" fill-opacity="0.5" stroke="#4da6ff" stroke-width="2" opacity="0.8"/>
    <path d="M-8 0 L-3 0 L3 -10 L9 0" fill="none" stroke="#4da6ff" stroke-width="2" stroke-linecap="round"/>
    <path d="M1 -11 L4 -6 L0 -8 L3 -3" fill="none" stroke="#ffcc00" stroke-width="1.3" opacity="0.8"/>
  </g>

  <!-- Title: CX GUARDIAN (white, bold, matching theme style) -->
  <g filter="url(#glowStrong)">
    <text x="540" y="890" font-family="'Segoe UI', Arial, sans-serif" font-size="76" font-weight="800"
          fill="#ffffff" text-anchor="middle" letter-spacing="4">CX GUARDIAN</text>
  </g>

  <!-- Subtitle in blue (matching "INCONCEIVABLE?" style) -->
  <text x="540" y="940" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="400"
        fill="#4da6ff" text-anchor="middle" letter-spacing="3" font-style="italic" opacity="0.95">SELF-HEALING RELIABILITY AGENT</text>


  <!-- SPARKATHON branding at bottom (matching official style) -->
  <g transform="translate(540, 1045)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700"
          fill="#ffffff" text-anchor="middle" letter-spacing="3">SPARK<tspan fill="#4da6ff">ATHON</tspan></text>
    <!-- Colorful dots (matching the official Sparkathon logo mark) -->
    <g transform="translate(-45, 10)">
      <circle cx="0" cy="0" r="3" fill="#ff3355"/>
      <circle cx="10" cy="0" r="3" fill="#ff6633"/>
      <circle cx="20" cy="0" r="3" fill="#ffcc00"/>
      <circle cx="30" cy="0" r="3" fill="#33cc66"/>
      <circle cx="40" cy="0" r="3" fill="#3399ff"/>
      <circle cx="50" cy="0" r="3" fill="#6633cc"/>
      <circle cx="60" cy="0" r="3" fill="#cc33ff"/>
      <circle cx="70" cy="0" r="3" fill="#ff3399"/>
      <circle cx="80" cy="0" r="3" fill="#33cccc"/>
    </g>
  </g>

  <!-- Corner accents (subtle blue) -->
  <path d="M25 25 L25 75 M25 25 L75 25" fill="none" stroke="#4da6ff" stroke-width="1.5" opacity="0.2"/>
  <path d="M1055 25 L1055 75 M1055 25 L1005 25" fill="none" stroke="#4da6ff" stroke-width="1.5" opacity="0.2"/>
  <path d="M25 1055 L25 1005 M25 1055 L75 1055" fill="none" stroke="#4da6ff" stroke-width="1.5" opacity="0.2"/>
  <path d="M1055 1055 L1055 1005 M1055 1055 L1005 1055" fill="none" stroke="#4da6ff" stroke-width="1.5" opacity="0.2"/>
</svg>